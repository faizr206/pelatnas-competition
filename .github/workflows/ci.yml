name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: competition
          POSTGRES_USER: competition
          POSTGRES_PASSWORD: competition
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U competition -d competition"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PYTHONPATH: .
      DATABASE_URL: postgresql+psycopg://competition:competition@localhost:5432/competition
      REDIS_URL: redis://localhost:6379/0
      SESSION_SECRET: ci-secret
      SESSION_COOKIE_NAME: competition_session
      SESSION_MAX_AGE_SECONDS: 28800
      WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      LOCAL_STORAGE_ROOT: /tmp/competition-storage
      DEFAULT_ADMIN_EMAIL: admin@example.com
      DEFAULT_ADMIN_PASSWORD: admin1234
      DEFAULT_ADMIN_NAME: CI Admin
      DEFAULT_COMPETITION_SLUG: ci-smoke-test
      DEFAULT_COMPETITION_TITLE: CI Smoke Test
      DEFAULT_COMPETITION_DESCRIPTION: CI baseline competition
      WORKER_ID: ci-worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements/dev.txt

      - name: Install web dependencies
        run: npm ci
        working-directory: apps/web

      - name: Formatting check
        run: ruff format --check apps packages tests

      - name: Lint
        run: ruff check apps packages tests

      - name: Type check
        run: mypy apps/api/app apps/worker/worker packages

      - name: Unit tests
        run: pytest apps/worker/tests tests/unit

      - name: Integration tests
        run: pytest apps/api/tests tests/integration

      - name: Web lint
        run: npm run lint
        working-directory: apps/web

      - name: Web type check
        run: npm run typecheck
        working-directory: apps/web

      - name: Migration validation
        run: alembic -c apps/api/alembic.ini upgrade head

      - name: Container build
        run: |
          docker build -f infra/docker/api.Dockerfile .
          docker build -f infra/docker/worker.Dockerfile .
          docker build -f infra/docker/web.Dockerfile .

